<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->

  <title>
    about — hollowboat
  </title>

  <meta name="description"
  content="contact hollowboat for calm and modern websites for shops, cafes, and creative brands." />

  <meta name="keywords"
  content="hollowboat contact, hollowboat studio, small business websites, indie web studio" />

  <meta name="author"
  content="hollowboat" />

  <!-- Theme -->

  <meta name="theme-color"
  content="#111111" />

  <!-- Fonts -->

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap"
  rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
  href="about.css">

</head>

<body>

  <main class="about-page">

    <!-- Fog -->

    <div class="fog"></div>

    <!-- NAV -->

    <nav>

      <div class="logo">
        hollowboat
      </div>

      <div class="nav-links">

        <a href="index.html">
          home
        </a>

        <a href="about.html">
          about
        </a>

      </div>

    </nav>

    <!-- MAIN CONTENT -->

    <section class="about-container">

      <!-- LEFT SIDE -->

      <div class="about-left">

        <h1>
          tell us about<br>
          your business.
        </h1>

        <p>
          the more you share, the better we can understand your vision and create something meaningful for your brand.
        </p>

      </div>

      <!-- RIGHT SIDE -->

      <div class="about-right">

        <form
        action="https://formsubmit.co/504ff43af9c0d17e483196ef76240d48"
        method="POST">

          <input type="hidden"
            name="_subject"
            value="New Hollowboat Inquiry">

          <!-- Disable captcha -->

          <input type="hidden"
          name="_captcha"
          value="false">

          <!-- Redirect -->

          <input type="hidden"
          name="_next"
          value="https://hollowboat.github.io/AboutUs/thankyou.html">

          <div class="input-group">

            <label>
              name
            </label>

            <input
            type="text"
            name="name"
            placeholder="your name"
            required>

          </div>

          <div class="input-group">

            <label>
              business name
            </label>

            <input
            type="text"
            name="business"
            placeholder="your business name"
            required>

          </div>

          <div class="input-group">

            <label>
              location
            </label>

            <input
            type="text"
            name="location"
            placeholder="city, country"
            required>

          </div>

          <div class="input-group">

            <label>
              website budget
            </label>

            <input
            type="text"
            name="budget"
            placeholder="your budget range"
            required>

          </div>

          <div class="input-group">

            <label>
              email
            </label>

            <input
            type="email"
            name="email"
            placeholder="your email address"
            required>

          </div>

          <button type="submit">
            send inquiry
          </button>

        </form>

      </div>

    </section>

    <!-- Bottom Boat Logo -->

    <div class="boat-logo">

      <img
      src="https://github.com/hollowboat/AboutUs/blob/main/Assests/homepage.png"
      alt="hollowboat logo">

    </div>

    <!-- FOOTER -->

    <footer>

      <p>
        © hollowboat 2026
      </p>

      <div class="footer-links">

        <a href="https://instagram.com/hollowboat"
        target="_blank">

          instagram

        </a>

        <a href="mailto:devfromasia@gmail.com">

          email

        </a>

      </div>

    </footer>

  </main>

  <!-- JS -->

  <script src="about.js"></script>

</body>
</html>
